name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: brew style
        run: brew style zaratan/bat-tools

      - name: brew audit (formulae)
        run: brew audit --formula --strict --tap zaratan/bat-tools

      - name: brew audit (casks)
        run: brew audit --cask --tap zaratan/bat-tools
